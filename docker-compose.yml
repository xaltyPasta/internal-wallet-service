version: "3.8"

services:

  postgres:
    image: postgres:15-alpine
    container_name: wallet_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wallet_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  wallet-service:
    build: .
    container_name: wallet_service
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wallet_db?schema=wallet
      PORT: 3000
    command: >
      sh -c "
      echo '⏳ Waiting for DB...' &&
      sleep 5 &&
      npx prisma migrate deploy &&
      npx prisma db seed &&
      npm run dev
      "

volumes:
  postgres_data:
